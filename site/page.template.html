<!doctype html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6FWQETB5HH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6FWQETB5HH');
  </script>
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{CANONICAL_URL}}">
{{ALTERNATE_LINKS}}
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{OG_LOCALE}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{SHORT_DESCRIPTION}}">
  <meta property="og:image" content="https://easebeyond.com/image/ogThumbnail.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{SHORT_DESCRIPTION}}">
  <meta name="twitter:image" content="https://easebeyond.com/image/ogThumbnail.png">
  <script type="application/ld+json">
{{STRUCTURED_DATA}}
  </script>
  <link rel="icon" href="{{ASSET_PREFIX}}image/favicon.ico">
  <style>
    html, body, iframe {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      overflow: hidden;
      background: #000;
    }
    iframe {
      position: fixed;
      inset: 0;
    }
    .intro {
      position: fixed;
      z-index: 1;
      right: 16px;
      bottom: 16px;
      max-width: min(420px, calc(100% - 32px));
      color: #fff;
      background: rgba(7, 12, 22, .92);
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: system-ui, sans-serif;
    }
    .intro summary {
      cursor: pointer;
      font-weight: 700;
    }
    .intro h1 {
      margin: 12px 0 6px;
      font-size: 18px;
    }
    .intro p, .intro nav {
      margin: 6px 0;
      line-height: 1.5;
      font-size: 14px;
    }
    .intro a {
      color: #9ecbff;
    }
  </style>
</head>
<body>
  <iframe id="game" src="{{ASSET_PREFIX}}Build/" title="{{IFRAME_TITLE}}" allow="fullscreen; autoplay" allowfullscreen></iframe>
{{INTRO_BLOCK}}
{{INTRO_SCRIPT}}
</body>
</html>
